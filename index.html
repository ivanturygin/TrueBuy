<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="./css/style.css">
	<title>TrueBuy</title>
</head>

<body>
	<header class="header">
		<div class="header__conteiner">
			<div class="header__wrapper">
				<div class="header__logo">True<span>Buy</span></div>
				<nav class="nav">
					<div class="nav__wrapper">

						<div class="nav__item">
							<a class="link" href="#"> Home</a>
						</div>

						<div class="nav__item">
							<a class="link" href="#">About us</a>
						</div>

						<div class="nav__item">
							<a class="link" href="#">Categories</a>
						</div>

					</div>

					<div class="header__icon">
						<button class="header__buttom">
							<img class="icon" src="./image/icon/Group.png" alt="logo">
						</button>
						<button class="header__buttom">
							<img class="icon" src="./image/icon/fa_user.png" alt="logo">
						</button>
					</div>

				</nav>

			</div>
		</div>
	</header>

	<main class="main">

   <section class="section-top">

	   <div class="conteiner section-top__image">

		<div class="section-top__wrapper">
			<div class="section-top__content">
				<div class="section-top__item">
					<h1 class="section-top__title">Now, furniture shopping is simple</h1>
					<div class="search">
						<input class="search__input" type="text" placeholder="Search your product here">
						<button class="search__button">search</button>
					</div>
				</div>
				<div class="section-top__item">
				<div class="section-top__text">We've got the furniture you need to fill your new home. 
					Browse now for free and get big discounts on everything from tables to lamps!</div>
			   </div>
			</div>

		</div>
	</div>
</section>
	</main>
</body>

</html>
